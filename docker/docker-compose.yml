services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: higgsfield
      POSTGRES_USER: higgsfield
      POSTGRES_PASSWORD: higgsfield_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U higgsfield"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8090:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=higgsfield;Username=higgsfield;Password=higgsfield_dev
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
